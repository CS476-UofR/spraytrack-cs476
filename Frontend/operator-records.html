<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Records</title>
  <link rel="stylesheet" href="Assets/styles.css" />
</head>

<body>
  <header>
    <div class="brand">Spray Records</div>
    <div class="right">
      <span id="pageTitle"></span>
      <span id="userMeta"></span>
      <button class="secondary" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="layout">
      <nav>
        <a href="operator-dashboard.html">Dashboard</a>
        <a href="operator-new-record.html">New Record</a>
        <a href="operator-records.html">My Records</a>
      </nav>

      <section style="flex:1">
        <h2>My Records</h2>
        <div class="row" style="align-items:end">
          <div style="max-width:260px">
            <div class="small">Status</div>
            <select id="status">
              <option value="ALL">All</option>
              <option value="DRAFT">Draft</option>
              <option value="SUBMITTED">Submitted</option>
              <option value="APPROVED">Approved</option>
              <option value="FLAGGED">Flagged</option>
            </select>
          </div>
          <button class="secondary" id="btnRefresh">Refresh</button>
        </div>

        <table class="table" id="tbl" style="margin-top:10px">
          <thead>
            <tr>
              <th>Date</th>
              <th>Product</th>
              <th>PCP #</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

      </section>
    </div>
  </main>

  <script src="Assets/app.js"></script>
  <script src="Assets/operator-records.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>New Record</title>
  <link rel="stylesheet" href="Assets/styles.css" />
</head>

<body>
  <header>
    <div class="brand">Spray Records</div>
    <div class="right">
      <span id="pageTitle"></span>
      <span id="userMeta"></span>
      <button class="secondary" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="layout">
      <nav>
        <a href="operator-dashboard.html">Dashboard</a>
        <a href="operator-new-record.html">New Record</a>
        <a href="operator-records.html">My Records</a>
      </nav>

      <section style="flex:1">
        <h2>New Spray Record</h2>
        <div id="msg" class="notice error" style="display:none"></div>

        <div class="card">
          <div class="grid2">
            <div>
              <div class="small">Date Applied *</div>
              <input id="dateApplied" type="date" />
            </div>
            <div>
              <div class="small">Product Name *</div>
              <input id="productName" placeholder="e.g., Glyphosate" />
            </div>
            <div>
              <div class="small">PCP Act # *</div>
              <input id="pcpActNumber" placeholder="e.g., 12345" />
              <div class="small">Tip: Use the number printed on the label.</div>
            </div>
            <div>
              <div class="small">Chemical Volume (L) *</div>
              <input id="chemicalVolumeL" placeholder="e.g., 2.5" />
            </div>
            <div>
              <div class="small">Water Volume (L) *</div>
              <input id="waterVolumeL" placeholder="e.g., 50" />
            </div>
            <div>
              <div class="small">Notes (optional)</div>
              <textarea id="notes"></textarea>
            </div>
          </div>

          <div class="row" style="margin-top:10px">
            <button class="secondary" id="btnDraft">Save Draft</button>
            <button id="btnNext">Next → Location</button>
          </div>
        </div>

      </section>
    </div>
  </main>
  <script src="Assets/app.js"></script>
  <script src="Assets/operator-new-record.js"></script>
</body>

</html>

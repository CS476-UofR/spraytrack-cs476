<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Operator Dashboard</title>
    <link rel="stylesheet" href="assets/styles.css" />
</head>

<body>
    <header>
        <div class="brand">Spray Records</div>
        <div class="right">
            <span id="pageTitle"></span>
            <span id="userMeta"></span>
            <button class="secondary" onclick="logout()">Logout</button>
        </div>
    </header>
    <main>
        <div class="layout">
            <nav>
                <a href="operator-dashboard.html">Dashboard</a>
                <a href="operator-new-record.html">New Record</a>
                <a href="operator-records.html">My Records</a>
            </nav>

            <section style="flex:1">
                <h2>Operator Dashboard</h2>
                <div class="row" id="kpis"></div>

                <div style="margin-top:12px" class="row">
                    <a href="operator-new-record.html"><button>+ New Spray Record</button></a>
                </div>

                <h3 style="margin-top:16px">Recent Records</h3>
                <table class="table" id="tbl">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Product</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

            </section>
        </div>
    </main>
    <script src="Assets/app.js"></script>
    <script src="Assets/operator-dashboard.js"></script>
</body>
</html>

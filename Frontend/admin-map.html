<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Map</title>
  <link rel="stylesheet" href="Assets/styles.css" />
</head>

<body>
  <header>
    <div class="brand">Spray Records</div>
    <div class="right">
      <span id="pageTitle"></span>
      <span id="userMeta"></span>
      <button class="secondary" onclick="logout()">Logout</button>
    </div>
  </header>
  <main>
    <div class="layout">
      <nav>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-search.html">Search Records</a>
        <a href="admin-map.html">Map View</a>
      </nav>

      <section style="flex:1">
        <h2>Map View (Coordinates)</h2>
        <div class="notice">
          This page lists records that have coordinates (lat/lng). Click a row to open OpenStreetMap.
        </div>

        <table class="table" id="tbl" style="margin-top:10px">
          <thead>
            <tr>
              <th>Date</th>
              <th>Operator</th>
              <th>Product</th>
              <th>Lat</th>
              <th>Lng</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

      </section>
    </div>
  </main>
  <script src="Assets/app.js"></script>
  <script src="Assets/admin-map.js"></script>
</body>

</html>
